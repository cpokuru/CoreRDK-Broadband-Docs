      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;

      border-color: transparent;
      box-shadow: 0 8px 18px rgba(11, 92, 171, 0.22);

      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 2px rgba(19, 49, 63, 0.04);

    tbody tr:nth-child(even) { background: rgba(230, 244, 248, 0.28); }
    tbody tr:hover { background: rgba(15, 139, 141, 0.08); }
    .sort-btn { border: 0; background: transparent; padding: 0; margin: 0; color: inherit; font: inherit; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }

    a.link { color: var(--brand); font-weight: 600; text-decoration: none; word-break: break-word; }
    a.link:hover { text-decoration: underline; }
    .empty { padding: 36px 20px 44px; text-align: center; color: var(--muted); }

  <script>
    const workbook = JSON.parse(document.getElementById('workbook-data').textContent);
    const tabsEl = document.getElementById('tabs');
    const headEl = document.getElementById('tableHead');
    const bodyEl = document.getElementById('tableBody');
    const searchEl = document.getElementById('searchInput');
    const sheetNameEl = document.getElementById('sheetName');
    const rowCountEl = document.getElementById('rowCount');
    const sortStateEl = document.getElementById('sortState');
    const emptyEl = document.getElementById('emptyState');
    const tableWrapEl = document.getElementById('tableWrap');
    const state = { activeSheet: 0, search: '', sort: { column: null, direction: 'asc' } };
    const urlMatcher = /(https?:\/\/[^\s]+)/g;

    function normalize(text) {
      return String(text ?? '').toLowerCase();
    }

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, function (ch) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
      });
    }

    function renderTabs() {
      tabsEl.innerHTML = '';
      workbook.sheets.forEach(function (sheet, index) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab' + (index === state.activeSheet ? ' active' : '');
        button.textContent = sheet.name;
        button.setAttribute('aria-pressed', index === state.activeSheet ? 'true' : 'false');
        button.addEventListener('click', function () {
          state.activeSheet = index;
          state.sort = { column: null, direction: 'asc' };
          tableWrapEl.scrollTop = 0;
          renderTabs();
          renderTable();
        });
        tabsEl.appendChild(button);
      });
    }

    function sortRows(rows) {
      if (state.sort.column === null) return rows;
      const column = state.sort.column;
      const direction = state.sort.direction === 'asc' ? 1 : -1;
      return rows.slice().sort(function (a, b) {
        const av = a.values[column] ?? '';
        const bv = b.values[column] ?? '';
        const an = Number(av);
        const bn = Number(bv);
        const bothNumeric = av !== '' && bv !== '' && !Number.isNaN(an) && !Number.isNaN(bn);
        if (bothNumeric && an !== bn) return (an - bn) * direction;
        return String(av).localeCompare(String(bv), undefined, { sensitivity: 'base', numeric: true }) * direction;
      });
    }

    function filteredRows(sheet) {
      const query = normalize(state.search.trim());
      const indexed = sheet.rows.map(function (values, idx) { return { values, idx }; });
      const filtered = !query ? indexed : indexed.filter(function (row) {
        return row.values.some(function (value) { return normalize(value).includes(query); });
      });
      return sortRows(filtered);
    }

    function sortLabel(sheet) {
      if (state.sort.column === null) return 'Sort: none';
      const header = sheet.headers[state.sort.column] || 'Column ' + (state.sort.column + 1);
      return 'Sort: ' + header + ' (' + (state.sort.direction === 'asc' ? 'A→Z / low→high' : 'Z→A / high→low') + ')';
    }

    function renderCellHtml(text) {
      const value = String(text ?? '');
      if (!urlMatcher.test(value)) return escapeHtml(value);
      urlMatcher.lastIndex = 0;
      return escapeHtml(value).replace(urlMatcher, function (url) {
        return '<a class="link" href="' + url + '" target="_blank" rel="noreferrer noopener">' + url + '</a>';
      }).replace(/\n/g, '<br>');
    }

    function renderTable() {
      const sheet = workbook.sheets[state.activeSheet];
      const rows = filteredRows(sheet);
      sheetNameEl.textContent = sheet.name + ' sheet';
      rowCountEl.textContent = 'Showing ' + rows.length + ' of ' + sheet.rows.length + ' rows';
      sortStateEl.textContent = sortLabel(sheet);
      headEl.innerHTML = '';
      bodyEl.innerHTML = '';

      const headerRow = document.createElement('tr');
      sheet.headers.forEach(function (header, columnIndex) {
        const th = document.createElement('th');
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'sort-btn';
        const label = header || 'Column ' + (columnIndex + 1);
        const icon = state.sort.column === columnIndex ? (state.sort.direction === 'asc' ? '▲' : '▼') : '↕';
        button.innerHTML = '<span>' + escapeHtml(label) + '</span><span class="sort-indicator">' + icon + '</span>';
        button.addEventListener('click', function () {
          if (state.sort.column === columnIndex) {
            state.sort.direction = state.sort.direction === 'asc' ? 'desc' : 'asc';
          } else {
            state.sort.column = columnIndex;
            state.sort.direction = 'asc';
          }
          renderTable();
        });
        th.appendChild(button);
        headerRow.appendChild(th);
      });
      headEl.appendChild(headerRow);

      rows.forEach(function (row) {
        const tr = document.createElement('tr');
        row.values.forEach(function (value) {
          const td = document.createElement('td');
          td.innerHTML = renderCellHtml(value);
          tr.appendChild(td);
        });
        bodyEl.appendChild(tr);
      });

      const hasRows = rows.length > 0;
      tableWrapEl.hidden = !hasRows;
      emptyEl.hidden = hasRows;
    }

    searchEl.addEventListener('input', function (event) {
      state.search = event.target.value;
      renderTable();
    });

    renderTabs();
    renderTable();
  </script>
